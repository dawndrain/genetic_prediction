name: genepred
channels:
  - conda-forge
  - bioconda
dependencies:
  - python>=3.10
  - numpy
  - pandas
  - scipy
  - click
  - requests
  - tqdm
  # external binaries the imputation/scoring backends shell out to
  - bcftools
  - htslib        # bgzip + tabix
  - plink2
  - openjdk>=11   # for Beagle
  - p7zip         # for Michigan zip decryption
  - pip
  - pip:
      - snps
      - cyvcf2
      - -e .
